services:
  - type: web
    name: cortexwiki-api
    runtime: python
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=. python run.py
    envVars:
      - key: PYTHONPATH
        value: .
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      # Groq — primary LLM
      - key: GROQ_API_KEY
        fromGroup: cortexwiki-secrets
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      # Gemini — fallback LLM + embeddings
      - key: GEMINI_API_KEY
        fromGroup: cortexwiki-secrets
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: models/gemini-embedding-001
      # Auth
      - key: SECRET_KEY
        fromGroup: cortexwiki-secrets
      # Datastores
      - key: MONGO_URI
        fromGroup: cortexwiki-secrets
      - key: MONGO_DB_NAME
        value: cortexwiki
      - key: REDIS_URL
        fromGroup: cortexwiki-secrets
      - key: NEO4J_URI
        fromGroup: cortexwiki-secrets
      - key: NEO4J_USER
        fromGroup: cortexwiki-secrets
      - key: NEO4J_PASSWORD
        fromGroup: cortexwiki-secrets
