<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cw-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5eead4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Squircle -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#cw-gradient)"/>
  
  <!-- "CW" Text - Increased font-size for better visibility -->
  <text 
    x="50%" 
    y="55%" 
    dominant-baseline="middle" 
    text-anchor="middle" 
    fill="#0a0f1e" 
    font-family="'IBM Plex Mono', monospace" 
    font-weight="800" 
    font-size="30"
    letter-spacing="-0.05em">CW</text>
</svg>
